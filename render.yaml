services:
  - type: web
    name: price-watchdogs
    runtime: python
    plan: starter
    buildCommand: |
      echo "Building frontend..."
      cd frontend
      npm install
      npm run build
      echo "Frontend build complete. Checking output..."
      ls -la out/ || echo "Warning: frontend/out directory not found"
      echo "Building backend..."
      cd ../backend
      pip install -r requirements.txt
      echo "Build complete"
    startCommand: cd backend && python start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: price-watchdogs-db
          property: connectionString
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_BASE_URL
        value: https://price-watchdogs.onrender.com
      - key: CORS_ORIGINS
        value: ""
      - key: FRONTEND_BASE_URL
        value: https://price-watchdogs.onrender.com

databases:
  - name: price-watchdogs-db
    plan: free
    databaseName: price_watchdogs
    user: price_watchdogs_user

