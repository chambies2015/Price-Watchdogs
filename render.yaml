services:
  - type: web
    name: price-watchdogs-api
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: price-watchdogs-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://price-watchdogs-frontend.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://price-watchdogs-frontend.onrender.com

  - type: web
    name: price-watchdogs-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXT_PUBLIC_API_URL
        value: https://price-watchdogs-api.onrender.com
      - key: NEXT_PUBLIC_BASE_URL
        value: https://price-watchdogs-frontend.onrender.com

databases:
  - name: price-watchdogs-db
    plan: free
    databaseName: price_watchdogs
    user: price_watchdogs_user

