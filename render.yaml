services:
  - type: web
    name: price-watchdogs-api
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: price-watchdogs-db
          property: connectionString

databases:
  - name: price-watchdogs-db
    plan: free
    databaseName: price_watchdogs
    user: price_watchdogs_user

