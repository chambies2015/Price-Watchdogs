services:
  - type: web
    name: price-watchdogs
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: price-watchdogs-db
          property: connectionString
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_BASE_URL
        value: https://price-watchdogs.onrender.com
      - key: CORS_ORIGINS
        value: ""
      - key: FRONTEND_BASE_URL
        value: https://price-watchdogs.onrender.com

databases:
  - name: price-watchdogs-db
    plan: free
    databaseName: price_watchdogs
    user: price_watchdogs_user

